<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Learn FL Studio music production — from complete beginner to advanced. Music-first approach." />
    <meta property="og:title" content="FL Studio 101" />
    <meta property="og:description" content="Learn FL Studio music production — from complete beginner to advanced. Music-first approach." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FL Studio 101" />
    <meta name="twitter:card" content="summary" />
    <title>FL Studio 101</title>
    <!-- Prevent flash of unstyled content: apply theme class before React mounts -->
    <script>
      ;(function () {
        try {
          var raw = localStorage.getItem('ui-store')
          var theme = raw ? JSON.parse(raw).state?.theme : undefined
          if (theme !== 'light') document.documentElement.classList.add('dark')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <!-- Restore path after GitHub Pages 404 redirect -->
    <script>
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&')
          }).join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
